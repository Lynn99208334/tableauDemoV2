spring.application.name=NovaLedger
server.port=8111

# === MySQL \u8CC7\u6599\u5EAB\u8A2D\u5B9A ===
spring.datasource.url=jdbc:mysql://localhost:3306/fin_core?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA \u8A2D\u5B9A\uFF08\u95DC\u9375\uFF01\u8B93 Flyway \u8CA0\u8CAC schema \u7BA1\u7406\uFF09===
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# === \u65E5\u8A8C\u8A2D\u5B9A ===
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

# === Multipart \u8A2D\u5B9A ===
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# === JWT \u8A2D\u5B9A ===
jwt.secret=R7!kQ9$Z2f@M6P#A8XWmT%hE4L^cJdVYB3S0n&U5aK
jwt.expiration=3600000

# === Redis \u8A2D\u5B9A ===
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000
spring.redis.database=0

# === Auth \u884C\u70BA\u63A7\u5236\uFF08\u6E2C\u8A66\uFF09===
app.auth.skip-email-verify=true

# \u6E2C\u8A66\u74B0\u5883\uFF1Atoken 5 \u5206\u9418
app.auth.verify-token-expire-minutes=5

# resend \u9A57\u8B49\u4FE1\u51B7\u537B\u79D2\u6578\uFF08\u6E2C\u8A66\u74B0\u5883\uFF09:\u4E0D\u51B7\u537B
app.auth.resend-cooldown-seconds=0