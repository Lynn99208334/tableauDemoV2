<script>
    (function(){
        const area = document.querySelector('.cc-drop-inner');   // 拖曳區
        const btn  = document.querySelector('.cc-drop-button');  // 紅色「選擇檔案」按鈕
        if (!area || !btn) return; // 防護，避免之後改版出錯

        // 建立隱藏 input[type=file]
        const input = document.createElement('input');
        input.type = 'file';
        input.multiple = true;
        input.accept = '.csv,.xlsx,.xls,.pdf';
        input.style.display = 'none';
        document.body.appendChild(input);

        // 點擊按鈕 → 開檔案選擇器
        btn.addEventListener('click', () => input.click());
        input.addEventListener('change', handleFiles);

        // 拖曳事件
        ['dragenter','dragover'].forEach(ev =>
            area.addEventListener(ev, e => {
                e.preventDefault();
                e.stopPropagation();
                area.classList.add('is-dragover');
            })
        );

        ['dragleave','drop'].forEach(ev =>
            area.addEventListener(ev, e => {
                e.preventDefault();
                e.stopPropagation();
                area.classList.remove('is-dragover');
            })
        );

        area.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files && files.length) {
                showSelected(files);
                // TODO: 這裡串你後端上傳/解析 API
            }
        });

        function handleFiles(e){
            if (e.target.files && e.target.files.length){
                showSelected(e.target.files);
                // TODO: 同樣可在這裡呼叫上傳
            }
        }

        function showSelected(files){
            const names = Array.from(files).map(f => f.name).join('、');
            const titleEl = area.querySelector('.cc-drop-title');
            const hintEl  = area.querySelector('.cc-drop-hint');

            if (titleEl) {
                titleEl.textContent = names || '信用卡帳單上傳';
            }
            if (hintEl) {
                hintEl.textContent = files.length
                    ? `已選擇 ${files.length} 個檔案`
                    : '或將檔案拖曳至此 · 支援 CSV / XLSX / PDF';
            }
        }
    })();
</script>
