<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('銀行管理', ~{::content}, ~{::pagejs})}">

<th:block th:fragment="content">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between mt-4 mb-2">
            <h1 class="h3 mb-0">銀行管理</h1>
            <button type="button" class="btn btn-primary btn-sm" onclick="openCreateModal()">
                <i class="fas fa-plus me-1"></i> 新增銀行
            </button>
        </div>
        <ol class="breadcrumb mb-4">
            <li class="breadcrumb-item"><a th:href="@{/page/dashboard}">首頁</a></li>
            <li class="breadcrumb-item active">銀行管理</li>
        </ol>

        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-university me-1"></i> 銀行清單
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>銀行代碼</th>
                            <th>銀行名稱</th>
                            <th>簡稱</th>
                            <th>國家</th>
                            <th class="text-center">狀態</th>
                            <th class="text-center">操作</th>
                        </tr>
                        </thead>
                        <tbody id="bankTableBody">
                        <tr><td colspan="6" class="text-center text-muted py-4">載入中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Create Modal -->
        <div class="modal fade" id="createModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">新增銀行</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">銀行代碼 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="createBankCode" maxlength="10" placeholder="例：812"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">銀行名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="createName" maxlength="100"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">簡稱</label>
                            <input type="text" class="form-control" id="createShortName" maxlength="50"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">國家 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="createCountry" maxlength="50" value="TW"/>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="createIsActive" checked/>
                                <label class="form-check-label" for="createIsActive">啟用</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="submitCreate()">新增</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">編輯銀行</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editBankCode"/>
                        <div class="mb-3">
                            <label class="form-label">銀行代碼</label>
                            <input type="text" class="form-control" id="editBankCodeDisplay" disabled/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">銀行名稱 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editName" maxlength="100"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">簡稱</label>
                            <input type="text" class="form-control" id="editShortName" maxlength="50"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">國家 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="editCountry" maxlength="50"/>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="editIsActive"/>
                                <label class="form-check-label" for="editIsActive">啟用</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="button" class="btn btn-primary" onclick="submitEdit()">儲存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</th:block>

<th:block th:fragment="pagejs">
    <script>
        let createModal, editModal;

        document.addEventListener('DOMContentLoaded', () => {
            createModal = new bootstrap.Modal(document.getElementById('createModal'));
            editModal   = new bootstrap.Modal(document.getElementById('editModal'));
            loadBanks();
        });

        function loadBanks() {
            fetch('/api/admin/banks')
                .then(res => res.json())
                .then(data => {
                    if (!data.success) {
                        document.getElementById('bankTableBody').innerHTML =
                            '<tr><td colspan="6" class="text-center text-danger">載入失敗</td></tr>';
                        return;
                    }
                    const banks = data.data || [];
                    if (banks.length === 0) {
                        document.getElementById('bankTableBody').innerHTML =
                            '<tr><td colspan="6" class="text-center text-muted py-4">尚無銀行資料</td></tr>';
                        return;
                    }
                    document.getElementById('bankTableBody').innerHTML = banks.map(b => `
                        <tr>
                            <td><code>${b.bankCode}</code></td>
                            <td>${b.name}</td>
                            <td>${b.shortName || '-'}</td>
                            <td>${b.country}</td>
                            <td class="text-center">
                                <span class="badge ${b.isActive ? 'bg-success' : 'bg-secondary'}">
                                    ${b.isActive ? '啟用' : '停用'}
                                </span>
                            </td>
                            <td class="text-center">
                                <button class="btn btn-outline-primary btn-sm"
                                        onclick="openEditModal('${b.bankCode}', '${b.name}', '${b.shortName || ''}', '${b.country}', ${b.isActive})">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                })
                .catch(() => {
                    document.getElementById('bankTableBody').innerHTML =
                        '<tr><td colspan="6" class="text-center text-danger">網路錯誤</td></tr>';
                });
        }

        function openCreateModal() {
            document.getElementById('createBankCode').value = '';
            document.getElementById('createName').value = '';
            document.getElementById('createShortName').value = '';
            document.getElementById('createCountry').value = 'TW';
            document.getElementById('createIsActive').checked = true;
            createModal.show();
        }

        function submitCreate() {
            const bankCode  = document.getElementById('createBankCode').value.trim();
            const name      = document.getElementById('createName').value.trim();
            const shortName = document.getElementById('createShortName').value.trim();
            const country   = document.getElementById('createCountry').value.trim();
            const isActive  = document.getElementById('createIsActive').checked;

            if (!bankCode) { Swal.fire({ icon: 'warning', title: '請填寫銀行代碼' }); return; }
            if (!name)     { Swal.fire({ icon: 'warning', title: '請填寫銀行名稱' }); return; }
            if (!country)  { Swal.fire({ icon: 'warning', title: '請填寫國家' }); return; }

            fetch('/api/admin/banks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bankCode, name, shortName: shortName || null, country, isActive })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    createModal.hide();
                    Swal.fire({ icon: 'success', title: '新增成功', timer: 1200, showConfirmButton: false })
                        .then(() => loadBanks());
                } else {
                    Swal.fire({ icon: 'error', title: '新增失敗', text: data.error?.message || '請稍後再試' });
                }
            })
            .catch(() => Swal.fire({ icon: 'error', title: '網路錯誤' }));
        }

        function openEditModal(bankCode, name, shortName, country, isActive) {
            document.getElementById('editBankCode').value        = bankCode;
            document.getElementById('editBankCodeDisplay').value = bankCode;
            document.getElementById('editName').value            = name;
            document.getElementById('editShortName').value       = shortName;
            document.getElementById('editCountry').value         = country;
            document.getElementById('editIsActive').checked      = isActive;
            editModal.show();
        }

        function submitEdit() {
            const bankCode  = document.getElementById('editBankCode').value;
            const name      = document.getElementById('editName').value.trim();
            const shortName = document.getElementById('editShortName').value.trim();
            const country   = document.getElementById('editCountry').value.trim();
            const isActive  = document.getElementById('editIsActive').checked;

            if (!name)    { Swal.fire({ icon: 'warning', title: '請填寫銀行名稱' }); return; }
            if (!country) { Swal.fire({ icon: 'warning', title: '請填寫國家' }); return; }

            fetch(`/api/admin/banks/${bankCode}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, shortName: shortName || null, country, isActive })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    editModal.hide();
                    Swal.fire({ icon: 'success', title: '儲存成功', timer: 1200, showConfirmButton: false })
                        .then(() => loadBanks());
                } else {
                    Swal.fire({ icon: 'error', title: '儲存失敗', text: data.error?.message || '請稍後再試' });
                }
            })
            .catch(() => Swal.fire({ icon: 'error', title: '網路錯誤' }));
        }
    </script>
</th:block>

</html>
