<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Login</title>

    <link href="/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="bg-primary">
<div id="layoutAuthentication">
    <div id="layoutAuthentication_content">
        <main>
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">

                            <!-- Header -->
                            <div class="card-header">
                                <h3 class="text-center font-weight-light my-4">Login</h3>
                            </div>

                            <!-- Body -->
                            <div class="card-body">

                                <!-- 登出成功提示 -->
                                <div th:if="${param.logout}" class="alert alert-success">
                                    已成功登出
                                </div>

                                <!-- 登入失敗提示 -->
                                <div th:if="${param.error}" class="alert alert-danger">
                                    帳號或密碼錯誤
                                </div>

                                <!-- 登入錯誤提示（JS 控制） -->
                                <div id="loginError" class="alert alert-danger d-none">
                                    帳號或密碼錯誤
                                </div>

                                <form id="loginForm">

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="email"
                                               type="email"
                                               name="username"
                                               placeholder="name@example.com"
                                               required />
                                        <label>Email address</label>
                                    </div>

                                    <div class="form-floating mb-3">
                                        <input class="form-control"
                                               id="password"
                                               type="password"
                                               name="password"
                                               placeholder="Password"
                                               required />
                                        <label>Password</label>
                                    </div>

                                    <div class="mb-3 text-center">
                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                onclick="fillLogin('admin@novaledger.dev','password123')">
                                            Admin
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                onclick="fillLogin('alice@novaledger.dev','password123')">
                                            Alice
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                onclick="fillLogin('bob@novaledger.dev','password123')">
                                            Bob
                                        </button>

                                        <button type="button" class="btn btn-outline-light btn-sm m-1"
                                                onclick="fillLogin('son@novaledger.dev','password123')">
                                            Son
                                        </button>
                                    </div>

                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <button type="submit" class="btn btn-primary">
                                            Login
                                        </button>
                                    </div>

                                </form>
                            </div>

                            <!-- Footer（一定在 form 外面） -->
                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    <a th:href="@{/page/register}">Need an account? Sign up!</a>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
<script src="/js/scripts.js"></script>
<style>
    .card-footer {
        position: relative;
        z-index: 999;
    }

    .card-footer a {
        pointer-events: auto !important;
    }
</style>

<script>
    function fillLogin(email, password) {
        document.getElementById("email").value = email;
        document.getElementById("password").value = password;
    }

    document.getElementById("loginForm").addEventListener("submit", async function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const loginError = document.getElementById("loginError");

        loginError.classList.add("d-none");

        try {
            const response = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            if (!response.ok) {
                loginError.classList.remove("d-none");
                return;
            }

            const data = await response.json();

            localStorage.setItem("accessToken", data.accessToken);
            localStorage.setItem("refreshToken", data.refreshToken);
            localStorage.setItem("username", data.username);

            window.location.href = "/page/dashboard";

        } catch (error) {
            console.error("Login failed", error);
            loginError.classList.remove("d-none");
        }
    });
</script>

</body>
</html>
