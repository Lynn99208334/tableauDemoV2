<!DOCTYPE html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>帳戶管理 - NovaLedger</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/vendor/sweetalert2.v11.10.6.min.css"/>
</head>

<body class="sb-nav-fixed">

<div th:replace="fragments/navbar :: topnav"></div>

<div id="layoutSidenav">
    <div id="layoutSidenav_nav">
        <div th:replace="fragments/navbar :: sidenav"></div>
    </div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">

                <div class="d-flex align-items-center justify-content-between mt-4 mb-2">
                    <h1 class="h3 mb-0">帳戶管理</h1>
                    <a th:href="@{/accounts/new}" class="btn btn-primary btn-sm">
                        <i class="fas fa-plus me-1"></i> 新增帳戶
                    </a>
                </div>
                <ol class="breadcrumb mb-4">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}">首頁</a></li>
                    <li class="breadcrumb-item active">帳戶管理</li>
                </ol>

                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fas fa-university me-1"></i> 我的帳戶
                    </div>
                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(accounts)}" class="text-center text-muted py-5">
                            <i class="fas fa-inbox fa-2x mb-2"></i>
                            <p class="mb-0">尚未建立任何帳戶，<a th:href="@{/accounts/new}">立即新增</a>。</p>
                        </div>

                        <div th:unless="${#lists.isEmpty(accounts)}" class="table-responsive">
                            <table class="table table-bordered table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th>帳戶名稱</th>
                                    <th>銀行代碼</th>
                                    <th>帳戶類型</th>
                                    <th class="text-end">目前餘額</th>
                                    <th class="text-center">幣別</th>
                                    <th class="text-center">操作</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="account : ${accounts}">
                                    <td th:text="${account.name}"></td>
                                    <td th:text="${account.bankCode}"></td>
                                    <td th:text="${account.accountType}"></td>
                                    <td class="text-end"
                                        th:text="${#numbers.formatDecimal(account.currentBalance, 1, 'COMMA', 0, 'POINT')}"></td>
                                    <td class="text-center" th:text="${account.currencyCode}"></td>
                                    <td class="text-center text-nowrap">
                                        <button type="button"
                                                class="btn btn-outline-primary btn-sm me-1"
                                                title="編輯"
                                                th:data-account-id="${account.id}"
                                                th:data-account-name="${account.name}"
                                                th:data-account-type="${account.accountType}"
                                                th:data-currency-code="${account.currencyCode}"
                                                th:data-bank-code="${account.bankCode}"
                                                th:data-account-number="${account.accountNumber}"
                                                th:data-notes="${account.notes}"
                                                onclick="openEditModal(this)">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button type="button"
                                                class="btn btn-outline-danger btn-sm"
                                                title="刪除"
                                                th:data-account-id="${account.id}"
                                                th:data-account-name="${account.name}"
                                                onclick="confirmDelete(this)">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </main>

        <footer class="py-4 bg-light mt-auto">
            <div class="container-fluid px-4">
                <div class="d-flex align-items-center justify-content-between small">
                    <div class="text-muted">Copyright &copy; NovaLedger 2026</div>
                </div>
            </div>
        </footer>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editAccountModal" tabindex="-1" aria-labelledby="editAccountModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editAccountModalLabel">編輯帳戶</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editAccountId"/>
                <input type="hidden" id="editAccountType"/>
                <div class="mb-3">
                    <label class="form-label">帳戶名稱 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="editName" maxlength="100"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">幣別 <span class="text-danger">*</span></label>
                    <select class="form-select" id="editCurrencyCode">
                        <option value="TWD">TWD 新台幣</option>
                        <option value="USD">USD 美元</option>
                        <option value="JPY">JPY 日圓</option>
                        <option value="EUR">EUR 歐元</option>
                        <option value="CNY">CNY 人民幣</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">銀行代碼</label>
                    <input type="text" class="form-control" id="editBankCode" maxlength="10"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">帳號</label>
                    <input type="text" class="form-control" id="editAccountNumber"/>
                </div>
                <div class="mb-3">
                    <label class="form-label">備註</label>
                    <textarea class="form-control" id="editNotes" rows="2" maxlength="500"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitEdit()">儲存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/js/scripts.js"></script>
<script src="/js/vendor/sweetalert2.all.v11.10.6.min.js"></script>

<script>
    function openEditModal(btn) {
        document.getElementById('editAccountId').value     = btn.dataset.accountId;
        document.getElementById('editAccountType').value   = btn.dataset.accountType;
        document.getElementById('editName').value          = btn.dataset.accountName;
        document.getElementById('editCurrencyCode').value  = btn.dataset.currencyCode;
        document.getElementById('editBankCode').value      = btn.dataset.bankCode || '';
        document.getElementById('editAccountNumber').value = btn.dataset.accountNumber || '';
        document.getElementById('editNotes').value         = btn.dataset.notes || '';

        new bootstrap.Modal(document.getElementById('editAccountModal')).show();
    }

    function submitEdit() {
        const accountId     = document.getElementById('editAccountId').value;
        const accountType   = document.getElementById('editAccountType').value;
        const name          = document.getElementById('editName').value.trim();
        const currencyCode  = document.getElementById('editCurrencyCode').value;
        const bankCode      = document.getElementById('editBankCode').value.trim();
        const accountNumber = document.getElementById('editAccountNumber').value.trim();
        const notes         = document.getElementById('editNotes').value.trim();

        if (!name) {
            Swal.fire({ icon: 'warning', title: '請填寫帳戶名稱' });
            return;
        }

        fetch(`/api/accounts/${accountId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                accountType:    accountType,
                name:           name,
                currencyCode:   currencyCode,
                initialBalance: 0,
                bankCode:       bankCode || null,
                accountNumber:  accountNumber || null,
                notes:          notes || null
            })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({ icon: 'success', title: '儲存成功', timer: 1200, showConfirmButton: false })
                        .then(() => location.reload());
                } else {
                    Swal.fire({ icon: 'error', title: '儲存失敗', text: data.message || '請稍後再試' });
                }
            })
            .catch(() => Swal.fire({ icon: 'error', title: '網路錯誤', text: '請稍後再試' }));
    }

    function confirmDelete(btn) {
        const accountId   = btn.dataset.accountId;
        const accountName = btn.dataset.accountName;

        Swal.fire({
            title: '確定要刪除？',
            html: `帳戶「<strong>${accountName}</strong>」刪除後無法復原。`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: '確定刪除',
            cancelButtonText: '取消'
        }).then(result => {
            if (result.isConfirmed) {
                fetch(`/api/accounts/${accountId}`, {
                    method: 'DELETE'
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            Swal.fire({ icon: 'success', title: '已刪除', timer: 1200, showConfirmButton: false })
                                .then(() => location.reload());
                        } else {
                            Swal.fire({ icon: 'error', title: '刪除失敗', text: data.message || '請稍後再試' });
                        }
                    })
                    .catch(() => Swal.fire({ icon: 'error', title: '網路錯誤', text: '請稍後再試' }));
            }
        });
    }
</script>

</body>
</html>
