<!DOCTYPE html>
<html lang="zh-Hant"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <title>Fragments</title>
</head>
<body>

<!-- ── Vendor CSS（放進 <head> 用） ───────────────────────── -->
<th:block th:fragment="vendor-css">
    <link rel="stylesheet" href="/css/vendor/sweetalert2.v11.10.6.min.css"/>
</th:block>

<!-- ── Top Navbar ───────────────────────────────────────────── -->
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark"
     th:fragment="topnav">

    <a class="navbar-brand ps-3" th:href="@{/page/dashboard}">
        NovaLedger
    </a>

    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
            id="sidebarToggle"
            aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0"
          role="search">
        <div class="input-group">
            <input class="form-control" type="text" placeholder="Search for..." aria-label="Search"/>
            <button class="btn btn-primary" type="button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </form>

    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">

        <li class="nav-item dropdown" id="userDropdownItem" style="display:none;">
            <a class="nav-link dropdown-toggle"
               id="navbarDropdown" href="#" role="button"
               data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-user fa-fw me-1"></i>
                <span id="navUsername"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li class="dropdown-item-text small text-muted">
                    登入身分：<strong id="navUsernameDetail"></strong>
                </li>
                <li class="dropdown-item-text small text-muted" id="navTokenExpiry"></li>
                <li><hr class="dropdown-divider"/></li>
                <li>
                    <button type="button" class="dropdown-item d-flex align-items-center" onclick="handleLogout()">
                        <i class="fas fa-sign-out-alt me-2"></i> Logout
                    </button>
                </li>
            </ul>
        </li>

        <li class="nav-item" id="loginLinkItem" style="display:none;">
            <a class="nav-link" href="/page/login">
                <i class="fas fa-sign-in-alt me-1"></i> Login
            </a>
        </li>
    </ul>
</nav>


<!-- ── Side Navbar (Sidenav) ───────────────────────────────── -->
<nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion" th:fragment="sidenav">
    <div class="sb-sidenav-menu">
        <div class="nav">
            <div class="sb-sidenav-menu-heading">Core</div>
            <a class="nav-link" th:href="@{/page/dashboard}">
                <div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>
                Dashboard
            </a>

            <div class="sb-sidenav-menu-heading">功能區</div>

            <a class="nav-link" th:href="@{/accounts}">
                <div class="sb-nav-link-icon"><i class="fas fa-university"></i></div>
                帳戶管理
            </a>

            <a class="nav-link" th:href="@{/cards}">
                <div class="sb-nav-link-icon"><i class="fas fa-credit-card"></i></div>
                信用卡管理
            </a>

            <a class="nav-link" th:href="@{/page/import}">
                <div class="sb-nav-link-icon"><i class="fas fa-file-import"></i></div>
                匯入對帳單
            </a>

            <a class="nav-link" th:href="@{/page/transactions}">
                <div class="sb-nav-link-icon"><i class="fas fa-list-alt"></i></div>
                交易記錄
            </a>

            <div class="sb-sidenav-menu-heading">系統管理</div>

            <a class="nav-link" th:href="@{/page/exchange-rates}">
                <div class="sb-nav-link-icon"><i class="fas fa-coins"></i></div>
                匯率管理
            </a>

            <a class="nav-link" th:href="@{/ccAnalysis}">
                <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                信用卡分析
            </a>

            <div class="sb-sidenav-menu-heading" sec:authorize="hasRole('ADMIN')">後台管理</div>

            <a class="nav-link" th:href="@{/page/admin/banks}"
               sec:authorize="hasRole('ADMIN')">
                <div class="sb-nav-link-icon"><i class="fas fa-landmark"></i></div>
                銀行管理
            </a>

            <a class="nav-link" th:href="@{/page/admin/users}"
               sec:authorize="hasRole('ADMIN')">
                <div class="sb-nav-link-icon"><i class="fas fa-users-cog"></i></div>
                使用者管理
            </a>
        </div>
    </div>
    <div class="sb-sidenav-footer">
        <div class="small">Logged in as:</div>
        <span sec:authentication="name">User</span>
    </div>
</nav>


<!-- ── Vendor JS（放在 </body> 前用） ─────────────────────── -->
<th:block th:fragment="vendor-js">
    <script defer src="/js/vendor/sockjs.v1.6.1.min.js"></script>
    <script defer src="/js/vendor/stomp.umd.v7.0.0.min.js"></script>
    <script defer src="/js/vendor/sweetalert2.all.v11.10.6.min.js"></script>

    <script>
        function getTokenExpiration(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1]));
                return payload.exp ? payload.exp * 1000 : null;
            } catch (e) {
                return null;
            }
        }

        function formatCountdown(ms) {
            if (ms <= 0) return '已過期';
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes} 分 ${seconds} 秒後登出`;
        }

        let countdownInterval = null;

        function initNavbar() {
            const token = localStorage.getItem('accessToken');
            const username = localStorage.getItem('username');

            const userDropdownItem = document.getElementById('userDropdownItem');
            const loginLinkItem = document.getElementById('loginLinkItem');

            if (!userDropdownItem || !loginLinkItem) {
                return;
            }

            if (token && username) {
                userDropdownItem.style.display = '';
                loginLinkItem.style.display = 'none';

                const navUsername = document.getElementById('navUsername');
                const navUsernameDetail = document.getElementById('navUsernameDetail');
                if (navUsername) navUsername.textContent = username;
                if (navUsernameDetail) navUsernameDetail.textContent = username;

                const expMs = getTokenExpiration(token);
                if (expMs) {
                    const expiryEl = document.getElementById('navTokenExpiry');
                    if (countdownInterval) clearInterval(countdownInterval);

                    countdownInterval = setInterval(() => {
                        const remaining = expMs - Date.now();
                        if (expiryEl) expiryEl.textContent = formatCountdown(remaining);
                        if (remaining <= 0) {
                            clearInterval(countdownInterval);
                            handleLogout();
                        }
                    }, 1000);
                }
            } else {
                userDropdownItem.style.display = 'none';
                loginLinkItem.style.display = '';
            }
        }

        async function handleLogout() {
            const token = localStorage.getItem('accessToken');

            if (token) {
                try {
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                } catch (e) {
                    console.warn('Logout API call failed, proceeding with local cleanup', e);
                }
            }

            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('username');
            window.location.href = '/page/login';
        }

        function redirectToLogin() {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('refreshToken');
            window.location.href = '/page/login';
        }

        async function apiFetch(url, options = {}) {
            const accessToken = localStorage.getItem('accessToken');

            if (!accessToken) {
                redirectToLogin();
                return null;
            }

            const headers = options.headers || {};

            const response = await fetch(url, {
                ...options,
                headers: {
                    ...headers,
                    'Authorization': 'Bearer ' + accessToken
                }
            });

            if (response.status === 401 || response.status === 403) {
                redirectToLogin();
                return null;
            }

            return response;
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initNavbar);
        } else {
            initNavbar();
        }
    </script>
</th:block>

</body>
</html>
