<!DOCTYPE html>
<html lang="zh-Hant"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="utf-8">
    <title>Fragments</title>
</head>
<body>

<!-- ── Vendor CSS（放進 <head> 用） ───────────────────────── -->
<th:block th:fragment="vendor-css">
    <!-- 全站共用的第三方樣式（例：SweetAlert2） -->
    <link rel="stylesheet" href="/css/vendor/sweetalert2.v11.10.6.min.css"/>
</th:block>

<!-- ── Top Navbar ───────────────────────────────────────────── -->
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark"
     th:fragment="topnav">

    <!-- Brand -->
    <a class="navbar-brand ps-3" th:href="@{/static}">
        Start Bootstrap
    </a>

    <!-- Sidebar Toggle -->
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0"
            id="sidebarToggle"
            aria-label="Toggle sidebar">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Search -->
    <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0"
          role="search">
        <div class="input-group">
            <input class="form-control"
                   type="text"
                   placeholder="Search for..."
                   aria-label="Search" />
            <button class="btn btn-primary" type="button">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </form>

    <!-- User Menu -->
    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">

        <!-- ✅ 已登入 -->
        <li class="nav-item dropdown"
            sec:authorize="isAuthenticated()">

            <a class="nav-link dropdown-toggle"
               id="navbarDropdown"
               href="#"
               role="button"
               data-bs-toggle="dropdown"
               aria-expanded="false">

                <i class="fas fa-user fa-fw me-1"></i>

                <!-- 登入者帳號 -->
                <span sec:authentication="name"></span>
            </a>

            <ul class="dropdown-menu dropdown-menu-end"
                aria-labelledby="navbarDropdown">

                <!-- 使用者資訊 -->
                <li class="dropdown-item-text small text-muted">
                    登入身分：
                    <strong sec:authentication="name"></strong>
                </li>

                <!--（可選）角色顯示 -->
                <li class="dropdown-item-text small text-muted">
                    權限：
                    <span sec:authentication="principal.authorities"></span>
                </li>

                <li><hr class="dropdown-divider"/></li>

                <!-- Logout -->
                <li>
                    <form th:action="@{/logout}"
                          method="post"
                          class="m-0">

                        <button type="submit"
                                class="dropdown-item d-flex align-items-center">

                            <i class="fas fa-sign-out-alt me-2"></i>
                            Logout
                        </button>
                    </form>
                </li>
            </ul>
        </li>

        <!-- ❌ 未登入（理論上不會看到，但防呆） -->
        <li class="nav-item"
            sec:authorize="!isAuthenticated()">
            <a class="nav-link" th:href="@{/login}">
                <i class="fas fa-sign-in-alt me-1"></i>
                Login
            </a>
        </li>

    </ul>
</nav>


<!-- ── Side Navbar (Sidenav) ───────────────────────────────── -->
<nav class="sb-sidenav accordion sb-sidenav-dark" id="sidenavAccordion" th:fragment="sidenav">
    <div class="sb-sidenav-menu">
        <div class="nav">
            <div class="sb-sidenav-menu-heading">Core</div>
            <a class="nav-link" th:href="@{/static}">
                <div class="sb-nav-link-icon"><i class="fas fa-tachometer-alt"></i></div>
                Dashboard
            </a>

            <div class="sb-sidenav-menu-heading">開發</div>
            <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseDevTestArea" aria-expanded="false" aria-controls="collapseDevTestArea">
                <div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>
                測試區
                <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
            </a>
            <div class="collapse" id="collapseDevTestArea" aria-labelledby="headingOne" data-bs-parent="#sidenavAccordion">
                <nav class="sb-sidenav-menu-nested nav">
                    <a class="nav-link" th:href="@{/bankSetting}">銀行基本設定</a>
                    <a class="nav-link" th:href="@{/ccSettingTest}">信用卡帳單測試</a>
                </nav>
            </div>

            <div class="sb-sidenav-menu-heading">Interface</div>
            <a class="nav-link collapsed" href="#" data-bs-toggle="collapse" data-bs-target="#collapseLayouts" aria-expanded="false" aria-controls="collapseLayouts">
                <div class="sb-nav-link-icon"><i class="fas fa-columns"></i></div>
                Layouts
                <div class="sb-sidenav-collapse-arrow"><i class="fas fa-angle-down"></i></div>
            </a>
            <div class="collapse" id="collapseLayouts" aria-labelledby="headingOne" data-bs-parent="#sidenavAccordion">
                <nav class="sb-sidenav-menu-nested nav">
                    <a class="nav-link" th:href="@{/layout-static}">Static Navigation</a>
                    <a class="nav-link" th:href="@{/layout-sidenav-light}">Light Sidenav</a>
                </nav>
            </div>

            <div class="sb-sidenav-menu-heading">功能區</div>
            <!-- <a class="nav-link" th:href="@{/ccTest}">
                <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                信用卡功能測試
            </a> -->

            <a class="nav-link" th:href="@{/accounts}">
                <div class="sb-nav-link-icon"><i class="fas fa-university"></i></div>
                帳戶管理
            </a>

            <a class="nav-link" th:href="@{/cards}">
                <div class="sb-nav-link-icon"><i class="fas fa-credit-card"></i></div>
                信用卡管理
            </a>

            <a class="nav-link" th:href="@{/ccAnalysis}">
                <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                信用卡分析
            </a>

            <div class="sb-sidenav-menu-heading">Addons</div>
            <a class="nav-link" th:href="@{/charts}">
                <div class="sb-nav-link-icon"><i class="fas fa-chart-area"></i></div>
                Charts
            </a>
            <a class="nav-link" th:href="@{/tables}">
                <div class="sb-nav-link-icon"><i class="fas fa-table"></i></div>
                Tables
            </a>
        </div>
    </div>
    <div class="sb-sidenav-footer">
        <div class="small">Logged in as:</div>
        Start Bootstrap
    </div>
</nav>

<!-- ── Vendor JS（放在 </body> 前用） ─────────────────────── -->
<th:block th:fragment="vendor-js">
    <!-- 全站共用第三方腳本；若僅部分頁需要，請改到該頁的 page-js 中載入 -->
    <script defer src="/js/vendor/sockjs.v1.6.1.min.js"></script>
    <script defer src="/js/vendor/stomp.umd.v7.0.0.min.js"></script>
    <script defer src="/js/vendor/sweetalert2.all.v11.10.6.min.js"></script>
</th:block>

</body>
</html>
