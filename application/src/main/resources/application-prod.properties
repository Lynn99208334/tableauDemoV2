# ============================================================
# Prod 環境設定（Railway）
# 只寫跟 application.properties 不同的部分
# 敏感值全部用 Railway 環境變數注入，不寫在此檔案
# ============================================================

# === HikariCP（Railway 連線數限制，調小 pool）===
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1

# === Flyway（prod 絕對不允許 clean）===
spring.flyway.clean-disabled=true

# === Thymeleaf（prod 開 cache，減少 template 解析時間）===
spring.thymeleaf.cache=true

# === DevTools（prod 關閉）===
spring.devtools.restart.enabled=false

# === Swagger（prod 關閉，減少啟動掃描時間）===
springdoc.swagger-ui.enabled=false

# === Log（prod 簡化）===
logging.level.root=WARN
logging.level.com.example.novaledger=INFO
logging.level.org.flywaydb=WARN
