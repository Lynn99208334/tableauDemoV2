# ============================================================
# Test 環境設定（GitHub Actions CI 專用）
# 只寫跟 application.properties 不同的部分
# ============================================================

# === MySQL（本機用 fin_core，CI 的 MySQL container 也建 fin_core）===
spring.datasource.url=jdbc:mysql://localhost:3306/fin_core?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Taipei&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=test_password

# === Flyway（test 允許 clean，每次 CI 都從乾淨狀態跑）===
spring.flyway.clean-disabled=false

# === Thymeleaf ===
spring.thymeleaf.cache=false

# === Swagger（CI 不需要）===
springdoc.swagger-ui.enabled=false

# === Log（CI 輸出簡化）===
logging.level.root=WARN
logging.level.com.example.novaledger=INFO
logging.level.org.flywaydb=WARN
